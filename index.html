<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D T-Shirt Viewer</title>
  <link rel="stylesheet" href="css/style.css"/>
<style>

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body{
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	flex-direction: column;
}

header{
	text-align: center;
	background-color: #000;
}

#container3D {
    position: relative;
    
}

#container3D canvas {
    display: block;
    position: relative;
}
</style>
</head>
<body>
<header>
<main>
  <div id="container3D" style="width: 100%; height: 100%;"></div>
</main>
</header>

<script type="module">
//Import the THREE.js library
import * as THREE from "https://cdn.skypack.dev/three@0.129.0/build/three.module.js";
// To allow for the camera to move around the scene
import { OrbitControls } from "https://cdn.skypack.dev/three@0.129.0/examples/jsm/controls/OrbitControls.js";
// To allow for importing the .gltf file
import { GLTFLoader } from "https://cdn.skypack.dev/three@0.129.0/examples/jsm/loaders/GLTFLoader.js";

//Create a Three.JS Scene
const scene = new THREE.Scene();
//create a new camera with positions and angles
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);

//Keep track of the mouse position, so we can make the tshirt move
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

//Keep the 3D object on a global variable so we can access it later
let object;

//OrbitControls allow the camera to move around the scene
let controls;

//Set which object to render
let objToRender = 'tshirt';

//Instantiate a loader for the .gltf file
const loader = new GLTFLoader();

//Load the file
loader.load(
	`./models/${objToRender}/scene.gltf`,
  function (gltf) {
    //If the file is loaded, add it to the scene
    object = gltf.scene;
	object.scale.set(0.07, 0.07, 0.07);   // Adjust size
    object.position.set(0, 0, 0); // Keep centered
    object.rotation.y = Math.PI;    // Face forward
    scene.add(object);
  },
  function (xhr) {
    //While it is loading, log the progress
    console.log((xhr.loaded / xhr.total * 100) + '% loaded');
  },
  function (error) {
    //If there is an error, log it
    console.error(error);
  }
);

//Instantiate a new renderer and set its size
const renderer = new THREE.WebGLRenderer({ alpha: true }); //Alpha: true allows for the transparent background
renderer.setSize(window.innerWidth, window.innerHeight);
camera.position.set(5,0,1);
//Add the renderer to the DOM
document.getElementById("container3D").appendChild(renderer.domElement);

//Set how far the camera will be from the 3D model
camera.position.z = objToRender === "tshirt" ? 25 : 500;

//Add lights to the scene, so we can actually see the 3D model
const topLight = new THREE.DirectionalLight(0xffffff, 1); // (color, intensity)
topLight.position.set(500, 500, 500) //top-left-ish
topLight.castShadow = true;
scene.add(topLight);

const ambientLight = new THREE.AmbientLight(0x333333, objToRender === "tshirt" ? 5 : 1);
scene.add(ambientLight);

//This adds controls to the camera, so we can rotate / zoom it with the mouse
if (objToRender === "tshirt") {
  controls = new OrbitControls(camera, renderer.domElement);
  
  // Restrict controls to only horizontal rotation
  controls.enablePan = false; // Disable panning
  controls.enableZoom = false; // Disable zooming
  controls.minPolarAngle = Math.PI / 2; // Lock vertical rotation to horizontal plane
  controls.maxPolarAngle = Math.PI / 2; // Lock vertical rotation to horizontal plane
  controls.target.set(0, 0, 0); // Keep target centered
}

//Render the scene
function animate() {
  requestAnimationFrame(animate);
  
  //Make the tshirt rotate only horizontally based on mouse X position
  if (object && objToRender === "tshirt") {
    // Only use mouseX for horizontal rotation, ignore mouseY
    // Map mouse X position to rotation angle (-1 to 1 range)
    const normalizedMouseX = (mouseX / window.innerWidth) * 2 - 1;
    object.rotation.y = Math.PI + normalizedMouseX * Math.PI; // Rotate left/right only
    
    // Keep the object centered and at fixed height
    object.position.set(0, 0, 0);
    
    // Remove any X rotation to keep it level
    object.rotation.x = 0;
  }
  
  renderer.render(scene, camera);
}

//Add a listener to the window, so we can resize the window and the camera
window.addEventListener("resize", function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

//add mouse position listener, so we can make the object rotate left/right only
document.onmousemove = (e) => {
  mouseX = e.clientX;
  // We still track mouseY but don't use it for rotation
  mouseY = e.clientY;
}

//Start the 3D rendering
animate();
</script>
</body>
</html>
